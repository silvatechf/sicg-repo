name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Tests unitarios
        run: |
          python -m pytest tests/unit -v --tb=short

      - name: Verificar que el pipeline corre de punta a punta (datos sintéticos)
        run: |
          PYTHONPATH=src python -m sicg.pipeline

  api-smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke test de la API (arranca y responde /health)
        run: |
          PYTHONPATH=src uvicorn sicg.api.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl --fail http://127.0.0.1:8000/health
